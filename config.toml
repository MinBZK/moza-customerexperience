# static-web-server config — kortere cache voor deze snel-itererende
# review-site. Zonder deze override zet static-web-server een
# dagenlange Cache-Control op alle bestanden (inclusief index.html),
# waardoor een gemerged fix voor bezoekers pas na een harde refresh of
# na afloop van de cache zichtbaar wordt.
[[advanced.headers]]
source = "**/*.html"

[advanced.headers.headers]
Cache-Control = "public, max-age=60, must-revalidate"
