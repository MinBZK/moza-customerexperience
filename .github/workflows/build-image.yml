name: Build, push & deploy container image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/minbzk/moza-customerexperience:latest
            ghcr.io/minbzk/moza-customerexperience:${{ github.sha }}

  # Rolt de zojuist gebouwde image automatisch uit naar ZAD (cx-moza.rijksapp.dev).
  # Het project-id staat hier vast op mce-e8z, zodat een release nooit per ongeluk
  # op een ander ZAD-project kan landen (zoals op 2 jul 2026 gebeurde met mozad-dle).
  # Vereist het repo-secret ZAD_API_KEY (API key van ZAD-project mce-e8z).
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ZAD
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: mce-e8z
          deployment-name: cx
          component: cx
          image: ghcr.io/minbzk/moza-customerexperience:${{ github.sha }}
          wait-for-ready: 'true'
